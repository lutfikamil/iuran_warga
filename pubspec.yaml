name: iuran_perumahan
description: "Aplikasi kelola pembayaran iuran warga."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.6.2
  provider: ^6.1.2
  intl: ^0.19.0
  pdf: ^3.10.7
  printing: ^5.13.4
  excel: ^4.0.3
  path_provider: ^2.1.5
  file_picker: ^8.1.2
  fl_chart: ^0.68.0
  file_saver: ^0.2.13
  async: ^2.13.0
  shared_preferences: ^2.5.4
  two_dimensional_scrollables: ^0.2.0
  share_plus: ^7.2.2
  universal_platform: ^1.0.0
  universal_html: ^2.3.0
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.1
  firebase_crashlytics: ^4.3.10
  logger: ^2.6.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/ # Pastikan folder assets/fonts sudah terdaftar
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700